name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# allow the workflow to publish Pages
permissions:
  contents: read
  pages: write
  id-token: write

# one live deploy at a time; don't cancel an in-flight publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build
        env:
          STATIC_EXPORT: "true"
          # project pages live at user.github.io/<repo> — derive the subpath.
          # For a user/org page or a custom domain, set this to an empty string.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
